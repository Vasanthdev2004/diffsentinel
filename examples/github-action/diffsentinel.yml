name: DiffSentinel

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DiffSentinel
        run: python -m pip install git+https://github.com/Vasanthdev2004/diffsentinel.git

      - name: Run DiffSentinel guard
        run: diffsentinel guard --project --sarif --fail-on-critical > diffsentinel.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: diffsentinel.sarif
